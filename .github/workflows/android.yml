name: Build Android APK

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Fix and Download Valid Gradle Wrapper
      run: |
        mkdir -p gradle/wrapper
        cd gradle/wrapper
        rm -f gradle-wrapper.jar
        curl -LO https://raw.githubusercontent.com/gradle/gradle/v9.3.1/gradle/wrapper/gradle-wrapper.jar
        cd ../..

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '9.3.1'

    - name: Accept Android SDK Licenses
      run: |
        yes | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --licenses || true

    - name: Prepare Environment Variables
      run: |
        if [ -f .env.example ]; then
          cp .env.example .env
        else
          touch .env
        fi

    - name: Decode Personal Debug Keystore
      env:
        DEBUG_KEYSTORE_DATA: ${{ secrets.DEBUG_KEYSTORE_BASE64 }}
      run: |
        if [ -n "$DEBUG_KEYSTORE_DATA" ]; then
          echo "Decoding personal debug.keystore from Secrets..."
          echo "$DEBUG_KEYSTORE_DATA" | base64 --decode > debug.keystore
        else
          echo "Secret not found, generating a fallback debug.keystore..."
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug, O=Android, C=US"
        fi

    - name: Build Debug APK
      run: gradle assembleDebug --no-daemon --stacktrace

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: Smart-Manager-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
